services:
  - type: web
    name: compiler-bot
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DEBUG
        value: "False"
      - key: APP_NAME
        value: "Compiler Bot"
      - key: API_V1_PREFIX
        value: "/api/v1"
      - key: CORS_ORIGINS
        value: "*"
